services:
  db:
    image: postgres:16-alpine
    container_name: sisg-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-sisg}
      POSTGRES_USER: ${DB_USER:-sisg}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sisg_local}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sisg} -d ${DB_NAME:-sisg}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sisg-web:latest
    container_name: sisg-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      WEB_APP_SECRET: ${WEB_APP_SECRET:-sabesp-relatorios-local}
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_DEBUG: ${WEB_DEBUG:-0}
      PORT: ${PORT:-5000}
      WEB_PORT: ${WEB_PORT:-5000}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-sabesp-relatorios-local}
      AUTH_JWT_EXP_MINUTES: ${AUTH_JWT_EXP_MINUTES:-60}
      DB_ENABLED: ${DB_ENABLED:-1}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-sisg}
      DB_USER: ${DB_USER:-sisg}
      DB_PASSWORD: ${DB_PASSWORD:-sisg_local}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}
      DATABASE_STRICT_STARTUP: ${DATABASE_STRICT_STARTUP:-0}
      CONTRACTS_AUTO_INIT_SCHEMA: ${CONTRACTS_AUTO_INIT_SCHEMA:-1}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./saidas:/app/saidas
      - ./BASE_MESTRA:/app/BASE_MESTRA
      - ./data/runtime:/app/data/runtime
      - ./data/drafts/web:/app/data/drafts/web
    restart: unless-stopped

volumes:
  postgres_data:
