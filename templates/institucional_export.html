<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ report.header.titulo }}</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f8fafc;
      color: #1f2937;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      padding: 16px;
    }
    .section {
      margin-top: 16px;
      border: 1px solid #d7dde5;
      border-radius: 6px;
      overflow: hidden;
    }
    .section h3 {
      margin: 0;
      font-size: 15px;
      background: #e9f1f9;
      padding: 10px 12px;
      border-bottom: 1px solid #d7dde5;
    }
    .section .body {
      padding: 10px 12px;
    }
    .table-wrap {
      overflow-x: auto;
      width: 100%;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 650px;
    }
    th, td {
      border: 1px solid #d7dde5;
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f1f5f9;
      font-weight: 700;
    }
    .text-right {
      text-align: right;
    }
    .muted {
      color: #64748b;
      font-size: 12px;
    }
    .simple-list {
      margin: 0;
      padding-left: 18px;
    }
    .simple-list li {
      margin-bottom: 4px;
      font-size: 13px;
    }
    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .chip {
      display: inline-block;
      border-radius: 999px;
      border: 1px solid #d7dde5;
      background: #f8fafc;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .multi-preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
    }
    .multi-preview-card {
      border: 1px solid #d7dde5;
      border-radius: 6px;
      padding: 8px;
      background: #f8fafc;
    }
    .multi-preview-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #334155;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .confirm-panel {
      border: 1px solid #d7dde5;
      border-radius: 6px;
      margin-bottom: 10px;
      background: #fff;
      overflow: hidden;
    }
    .confirm-panel-title {
      background: #eef2f7;
      border-bottom: 1px solid #d7dde5;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .confirm-panel-body {
      padding: 10px;
    }
    @media print {
      body { background: #fff; padding: 0; }
      .container { border: none; padding: 0; }
      .section { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <main class="container">
    {% set show_previa_tecnica = false %}
    {% include "institucional_sections.html" %}
  </main>
</body>
</html>
